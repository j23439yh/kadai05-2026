<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="utf-8">
        <title>演習課題5-3：自動販売機（クラス）</title>
    </head>
    <body>
        <h1 id="vending-machine">自動販売機システム</h1>

        <!-- 所持金表示 -->
        <h2>所持金：<span id="money">1000</span>円</h2>

        <!-- メッセージ表示 -->
        <p id="message"></p>

        <table id="item_area" border="1"></table>

        <script>
            // 所持金
            let wallet = 1000;

            // 商品一覧を記録する連想配列の配列
            const items =  [
                { id: 1, name: "緑茶", price: 140, stock: 5 },
                { id: 2, name: "水", price: 100, stock: 14 },
                { id: 3, name: "オレンジジュース", price: 150, stock: 7 },
                { id: 4, name: "リンゴジュース", price: 150, stock: 9 },
                { id: 5, name: "炭酸水", price: 120, stock: 1 },
                { id: 6, name: "サイダー", price: 160, stock: 3 },
                { id: 7, name: "コーヒー", price: 170, stock: 8 },
                { id: 8, name: "紅茶", price: 140, stock: 6 }
            ];

            // 商品用のクラス定義
            class Item {
                static number = 0;

                constructor(name, price, stock) {
                    Item.number++;
                    this.id = Item.number;
                    this.name = name;
                    this.price = price;
                    this.stock = stock;
                }

                // 商品一覧の表示関数
                static showItemList(list) {
                    console.log("商品は以下の" + Item.number + "種類です。");

                    // 配列の内容を項目毎に出力
                    for (let i = 0; i < list.length; i++) {
                        console.log(
                            "商品番号: " + list[i].id +
                            ", 商品名: " + list[i].name +
                            ", 金額: " + list[i].price +
                            ", 在庫数: " + list[i].stock
                        );
                    }

                    console.log(""); // 空行の出力
                }

                // 商品購入の関数
                buyItem() {

                    // 在庫確認
                    if (this.stock < 1) {
                        console.log(this.name + "は商品の在庫がないため購入できません。");
                        document.getElementById("message").textContent =
                            this.name + "は在庫切れです。";
                        return;
                    }

                    // 所持金確認
                    if (wallet < this.price) {
                        console.log("所持金が不足しています。");
                        document.getElementById("message").textContent =
                            "所持金が不足しています。";
                        return;
                    }

                    console.log("商品番号: " + this.id + ", 商品名: " + this.name + "を購入します。");

                    // 購入による商品の在庫削減処理
                    this.stock--;

                    // 所持金を減らす
                    wallet -= this.price;

                    console.log("残りは" + this.stock + "個です。");

                    // 在庫数更新
                    document.getElementById("stock" + this.id).textContent = this.stock;

                    // 所持金表示更新
                    document.getElementById("money").textContent = wallet;

                    // 購入メッセージ表示
                    document.getElementById("message").textContent =
                        this.name + "を購入しました。残金は" + wallet + "円です。";
                }
            } // End of Item class

            // 商品テーブルのエレメント抽出
            const itemArea = document.getElementById("item_area");

            itemArea.innerHTML +=
                "<tr>" +
                "<th>商品名</th>" +
                "<th>金額</th>" +
                "<th>在庫数</th>" +
                "<th>購入</th>" +
                "</tr>";

            // 配列のオブジェクト作成
            const item_list = new Array(items.length);

            // 商品オブジェクトの生成
            for (let i = 0; i < items.length; i++) {

                item_list[i] = new Item(
                    items[i].name,
                    items[i].price,
                    items[i].stock
                );

                console.log(
                    "id: " + item_list[i].id +
                    ", name: " + item_list[i].name +
                    ", " + item_list[i].price + "円" +
                    ", 残り" + item_list[i].stock + "個"
                );
            }

            // 商品表の作成
            for (let i = 0; i < item_list.length; i++) {

                itemArea.innerHTML +=
                    "<tr>" +
                    "<td>" + item_list[i].name + "</td>" +
                    "<td>" + item_list[i].price + "円</td>" +
                    "<td id='stock" + item_list[i].id + "'>" +
                    item_list[i].stock +
                    "</td>" +
                    "<td>" +
                    "<button id='button" + item_list[i].id + "'>購入</button>" +
                    "</td>" +
                    "</tr>";
            }

            // クリックイベント時の購入処理の設定
            for (let i = 0; i < item_list.length; i++) {

                document.getElementById("button" + item_list[i].id).onclick = () => {
                    item_list[i].buyItem();
                };
            }

            Item.showItemList(item_list);

        </script>
    </body>
</html>
